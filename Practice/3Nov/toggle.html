<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggle Example</title>
  <style>
    body {
      background-color: white;
      color: black;
      text-align: center;
      font-family: Arial;
      padding-top: 100px;
    }

    .dark-mode {
      background-color: black;
      color: white;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background-color: royalblue;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>Hello, Toggle Example!</h1>
  <button id="toggleBtn">Switch Mode</button>

  <script>
    let button = document.querySelector("#toggleBtn");

    button.addEventListener("click", () => {
      // 👇 toggle 'dark-mode' class on the body
      document.body.classList.toggle("dark-mode");
    });
  </script>
</body>
</html>
