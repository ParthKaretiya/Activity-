<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled UI</title>

</head>
<style>
    *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", sans-serif;
}

body{
    height: 100vh;
    width: 100%;
    background: #f5f7fa; /* clean light grey */
    display: flex;
    justify-content: center;
    align-items: center;
}

.wrapper{
    background: white;
    padding: 40px 50px;
    border-radius: 14px;
    box-shadow: 0px 10px 35px rgba(0,0,0,0.08);
    width: 380px;
}

.title{
    text-align: center;
    font-size: 24px;
    color: #333;
    margin-bottom: 25px;
    font-weight: 600;
}

.container{
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.input{
    padding: 14px 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 15px;
    outline: none;
    transition: 0.25s ease;
}

.input:focus{
    border-color: #007bff;
    box-shadow: 0 0 0 2px rgba(0,123,255,0.15);
}

.btn{
    padding: 14px;
    border-radius: 8px;
    background-color: #007bff;
    color: white;
    font-size: 16px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: 0.25s ease;
}

.btn:hover{
    background-color: #0067d3;
}

.message{
    min-height: 24px;
    font-size: 15px;
    text-align: center;
    font-weight: 500;
}

</style>
<body>

    <div class="container">
        <div class="box">
            <input type="text" placeholder="Enter a character...">
        </div>

        <button class="btn">Click Me</button>

        <div class="para"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
