<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 30px; }
        
        input { padding: 10px; font-size: 16px; width: 200px; }
        
        #btnAdd { 
            padding: 10px 20px; 
            font-size: 16px; 
            cursor: pointer; 
            background: #27ae60; 
            color: white; 
            border: none; 
            margin-left: 5px;
        }

        ul { margin-top: 20px; font-size: 18px; padding-left: 0; }
        
        li { 
            list-style: none; 
            margin-bottom: 5px; 
            padding: 10px; 
            background: #eee; 
            display: flex; 
            justify-content: space-between; /* Pushes button to far right */
            align-items: center;
            width: 300px;
            border-radius: 5px;
        }

        /* This makes the button red and visible */
        .delete-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 12px;
            cursor: pointer;
            border-radius: 3px;
            margin-left: 10px;
            font-weight: bold;
        }

        .delete-btn:hover {
            background-color: #c0392b; /* Darker red on hover */
        }
    </style>
</head>
<body>

    <h3>My Dynamic To-Do List</h3>

    <input type="text" id="taskInput" placeholder="New Task...">
    <button id="btnAdd">Add Task</button>

    <ul id="taskList"></ul>

    <script src="script.js"></script>
</body>
</html>
