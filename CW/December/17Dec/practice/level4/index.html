<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: sans-serif;
            padding: 30px;
        }

        input {
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #27ae60;
            color: white;
            border: none;
        }

        ul {
            margin-top: 20px;
            font-size: 18px;
        }

        li {
            margin-bottom: 5px;
            padding: 5px;
            background: #eee;
        }
    </style>
</head>

<body>

    <h3>My Simple Todo List</h3>

    <input type="text" id="taskInput" placeholder="New Task...">
    <button id="btnAdd">Add Task</button>

    <ul id="taskList"></ul>

    <script src="script.js"></script>
</body>

</html>
