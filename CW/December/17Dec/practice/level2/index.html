<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 50px; }
        
        #counterDisplay {
            font-size: 80px;
            font-weight: bold;
            margin-bottom: 20px;
            color: black; /* Starts black */
        }

        .buttons { display: flex; gap: 10px; }
        
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #333;
            color: white;
            transition: background 0.2s;
        }

        button:hover { background-color: #555; }
        #btnReset { background-color: #e74c3c; } /* Red for reset */
    </style>
</head>
<body>

    <div id="counterDisplay">0</div>

    <div class="buttons">
        <button id="btnDown">Decrease (-)</button>
        <button id="btnReset">Reset</button>
        <button id="btnUp">Increase (+)</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
