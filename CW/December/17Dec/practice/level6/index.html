<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: sans-serif;
            padding: 40px;
            text-align: center;
        }

        input {
            padding: 10px;
            font-size: 18px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background: #8e44ad;
            color: white;
            border: none;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <h1 id="greeting">Hello, Stranger!</h1>

    <div class="controls">
        <input type="text" id="nameInput" placeholder="Enter your name...">
        <button id="btnSave">Save Name</button>
        <button id="btnClear">Forget Me</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
