<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            padding: 50px;
            font-family: sans-serif;
            transition: background 0.3s, color 0.3s;
            /* Makes the change smooth */
        }


        body {
            background-color: white;
            color: black;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }


        .dark-mode {
            background-color: #222;
            color: #eee;
        }

        .dark-mode button {
            background-color: #444;
            color: white;
            border: 1px solid white;
        }
    </style>
</head>

<body>

    <h1>The Theme Switcher</h1>
    <p>Click the button to change the vibe.</p>

    <button id="themeBtn">Toggle Dark Mode</button>

    <script src="script.js"></script>
</body>

</html>
