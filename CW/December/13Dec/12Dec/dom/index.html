<!DOCTYPE html>
<html>
<head>
    <title>Simple Input UI</title>
    <style>
        .container {
            width: 300px;
            margin: 50px auto;
            text-align: center;
            font-family: Arial;
        }

        .input-box {
            width: 90%;
            padding: 10px;
            border: 2px solid #555;
            border-radius: 6px;
            font-size: 16px;
        }

        .btn {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: royalblue;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <input type="text" class="input-box" placeholder="Enter here">
        <div class="btn">
        <button >Click</button>
        </div>
        <p class="result"></p>
    </div>
<script src="script.js"></script>
</body>
</html>
