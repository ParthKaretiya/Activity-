<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>document</title>
  <style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

.navbar {
  background-color: #152eae;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  position: relative;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
  margin: 0;
}

.nav-links li a {
  color: white;
  text-decoration: none;
  padding: 8px 12px;

}

.nav-links li a:hover {
  background: #555;
  border-radius: 4px;
}

.menu-icon {
  display: none;
  flex-direction: column;
  cursor: pointer;
}

.menu-icon div {
  width: 25px;
  height: 3px;
  background-color: white;
  margin: 4px 0;
  transition: 0.4s;
}

@media (max-width: 768px) {
  .nav-links {
    display: none;
    position: absolute;
    top: 60px;
    right: 25px;
    background: #333;
    flex-direction: column;
    width: 150px;
    border-radius: 5px;
    text-align: right;
  }

  .menu-icon {
    display: flex;
  }

  .menu-icon:hover + .nav-links {
    display: flex;
  }
}

  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo"> MyLogo</div>
    <div class="menu-icon">
      <div></div>
      <div></div>
      <div></div>
    </div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>
</body>
</html>
