<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Counter Game</title>
    <link rel="stylesheet" href="index.css">

</head>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    background: linear-gradient(270deg, #2d89cb, #626180, #3b39a9);
    background-size: 600% 600%;
    animation: moveBackground 3s ease infinite;
}

  @keyframes moveBackground {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

.container {
    background: white;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    max-width: 600px;
    width: 100%;
    text-align: center;
}

h1 {
    color: #667eea;
    font-size: 2.5em;
    margin-bottom: 10px;
}

.subtitle {
    color: #666;
    font-size: 1.1em;
    margin-bottom: 30px;
}

.score-section {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

.score-box {
    flex: 1;
    background: linear-gradient(135deg, #70b6c9 0%, #6087b0 100%);
    border-radius: 15px;
    padding: 20px;
    color: white;
}

.score-box h2 {
    font-size: 1em;
    margin-bottom: 10px;
    opacity: 0.9;
}

.score {
    font-size: 3em;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}

.timer-section {
    background: #f8f9fa;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 30px;
}

.timer-section h2 {
    color: #333;
    font-size: 1.1em;
    margin-bottom: 10px;
}

.timer {
    font-size: 3.5em;
    font-weight: bold;
    color: #6677c3;
    font-family: 'Courier New', monospace;
}

.button-section {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-bottom: 20px;
}

.click-btn {
    background: linear-gradient(135deg, #3889b2 0%, #075a6e 100%);
    color: white;
    border: none;
    border-radius: 15px;
    padding: 30px;
    font-size: 1.8em;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
}

.click-btn:hover:not(:disabled) {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(245, 87, 108, 0.6);
}

.click-btn:active:not(:disabled) {
    transform: translateY(0);
    box-shadow: 0 3px 10px rgba(245, 87, 108, 0.4);
}

.click-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
    box-shadow: none;
}

.start-btn {
    background: linear-gradient(135deg, #57a3c9 0%, #2f7377 100%);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 15px 30px;
    font-size: 1.2em;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(78, 168, 184, 0.4);
}

.start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(102, 126, 234, 0.6);
}

.start-btn:active {
    transform: translateY(0);
}

.reset-btn {
    background: #ff6b6b;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 25px;
    font-size: 1em;
    font-weight: bold;
}

.reset-btn:hover {
    background: #ee5a5a;
}

.status-message {
    font-size: 1.2em;
    font-weight: bold;
    padding: 15px;
    border-radius: 10px;
    background: #f8f9fa;
    color: #333;
}
</style>
<body>
    <div class="container">
        <h1>Click Counter Game</h1>
        <p class="subtitle">Click as fast as you can!</p>
        
        <!-- Score Display Section -->
        <div class="score-section">
            <div class="score-box">
                <h2>Current Score</h2>
                <div id="currentScore" class="score">0</div>
            </div>
            <div class="score-box">
                <h2>High Score</h2>
                <div id="highScore" class="score">0</div>
            </div>
        </div>
        
        <!-- Timer Display -->
        <div class="timer-section">
            <h2>Time Remaining</h2>
            <div id="timer" class="timer">10</div>
        </div>
        
        <!-- Game Buttons -->
        <div class="button-section">
            <button id="clickButton" class="click-btn" disabled>
                Click Me!
            </button>
            <button id="startButton" class="start-btn">
                Start Game
            </button>
            <button id="resetButton" class="reset-btn">
                Reset High Score
            </button>
        </div>
        
        <!-- Game Status Message -->
        <div id="statusMessage" class="status-message">
            Click "Start Game" to begin!
        </div>
    </div>
    
    <script src="game.js".js"></script>
</body>
</html>
